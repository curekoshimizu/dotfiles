name: "Setup uv and install"
inputs:
  python-version:
    description: "Python version to use"
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Install python
      shell: bash
      run: uv python install ${{ inputs.python-version }}
    - name: Install dependencies
      shell: bash
      run: uv sync --locked
